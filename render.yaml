services:
  - type: web
    name: tax-agent-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AGENT_ID
        sync: false
      - key: ENVIRONMENT_ID
        sync: false
      - key: API_KEYS
        sync: false

  - type: web
    name: tax-agent-mcp
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m tax_mcp.server
    envVars:
      - key: MCP_TRANSPORT
        value: sse
      - key: TAX_AGENT_API_URL
        sync: false
      - key: API_KEYS
        sync: false
      - key: MCP_API_KEY
        sync: false
